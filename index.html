
<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Mobil Uygulama Modu (PWA) Ayarları -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StitchSecure">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f1c23">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=stitch&backgroundColor=0088cc">
  
  <title>StitchSecure - Güvenli İletişim</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#0088cc',
            'background-dark': '#0f1c23',
            'surface-dark': '#16252d',
            'stitch-green': '#00ed64',
            'stitch-blue': '#0068ff',
            'stitch-border': 'rgba(255, 255, 255, 0.1)'
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      /* Güvenli alan (çentik) desteği */
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    body {
      background-color: #0b1217;
      color: #e1e7ec;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      /* Çentikli telefonlar için padding */
      padding-top: var(--sat);
      padding-bottom: var(--sab);
    }
    #root {
      height: 100%;
      width: 100%;
    }
    /* Mobil cihazlarda dokunma geri bildirimini iyileştir */
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    input {
      user-select: text;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #2a3d48;
      border-radius: 10px;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
</head>
<body class="font-sans antialiased">
  <div id="root"></div>
</body>
</html>
